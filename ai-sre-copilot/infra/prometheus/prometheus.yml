# Prometheus Configuration
# Scrape interval: har 15 sec mein metrics collect karo

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'local-dev'
    env: 'development'

# Alert rules files
rule_files:
  - "alerts.yml"

# AlertManager ko alerts bhejo
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape Configs ────────────────────────────
scrape_configs:

  # Prometheus apne aap ko monitor kare
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI app metrics
  - job_name: 'sre-fastapi'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics

  # Node Exporter (host machine metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Kafka metrics (JMX exporter agar laga ho)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9101']
    honor_labels: true
